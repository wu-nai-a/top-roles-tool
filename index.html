<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI主播替换工具 - 格式修复 · 排序筛选 · Top角色</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #f4f5f9; --card: #fff; --text: #1a1d29; --text2: #6b7094;
    --border: #e2e4eb; --primary: #4f6ef7; --success: #34c759;
    --male: #4f6ef7; --female: #ff6b9d; --radius: 8px; --fixed-bg: #e8f5e9;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:10px}
  .app{max-width:100%;margin:0 auto}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:3px}
  header h1{font-size:14px;font-weight:600}
  header h1 small{font-size:9px;font-weight:400;color:var(--text2);margin-left:3px}
  .uz{border:2px dashed var(--border);border-radius:var(--radius);padding:16px 10px;text-align:center;background:var(--card);cursor:pointer;transition:border-color .2s;margin-bottom:5px}
  .uz:hover,.uz.dragover{border-color:var(--primary);background:#eef1ff}
  .uz .icon{font-size:20px;opacity:.5}
  .uz p{color:var(--text2);font-size:10px;margin:2px 0}
  .uz .btn{padding:4px 12px;background:var(--primary);color:#fff;border:none;border-radius:4px;font-size:11px;cursor:pointer}
  #fi{display:none}
  .prog{display:none;text-align:center;padding:20px 10px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius)}
  .prog .spin{display:inline-block;width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:s .7s linear infinite;margin-bottom:4px}
  @keyframes s{to{transform:rotate(360deg)}}
  .prog .step{font-size:12px;font-weight:500}
  .prog .det{font-size:9px;color:var(--text2)}
  .prog .barw{width:40%;max-width:200px;height:4px;background:var(--border);border-radius:3px;margin:6px auto 0;overflow:hidden}
  .prog .barf{height:100%;width:0;background:var(--primary);border-radius:3px;transition:width .3s}
  .cfg{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:5px 8px;margin-bottom:4px;display:none}
  .cfg h3{font-size:10px;font-weight:600;margin-bottom:2px;color:var(--text)}
  .cfg-row{display:flex;flex-wrap:wrap;gap:3px 8px;align-items:center}
  .cfg-row label{font-size:9px;color:var(--text2);display:flex;align-items:center;gap:2px}
  .cfg-row select,.cfg-row input{padding:2px 3px;border:1px solid var(--border);border-radius:3px;font-size:9px;background:#fff}
  .cfg-row textarea{padding:2px 3px;border:1px solid var(--border);border-radius:3px;font-size:9px;font-family:monospace;resize:vertical;height:30px;width:160px}
  .cfg .btn{padding:2px 6px;border-radius:3px;font-size:9px;border:1px solid var(--border);background:#fff;cursor:pointer}
  .cfg .btn:hover{border-color:var(--primary);color:var(--primary)}
  .sum{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:4px 8px;display:none;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:4px}
  .sum .st{display:flex;flex-direction:column;min-width:40px}
  .sum .st .nm{font-size:12px;font-weight:700}
  .sum .st .lb{font-size:8px;color:var(--text2)}
  .sum .st.m .nm{color:var(--male)}.sum .st.f .nm{color:var(--female)}
  .sum .st.fx .nm{color:var(--success)}.sum .st.tp .nm{color:var(--primary)}
  .fxr{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:4px 8px;display:none;margin-bottom:4px}
  .fxr h3{font-size:9px;font-weight:600}
  .fxr .fxg{display:flex;flex-wrap:wrap;gap:2px}
  .fxr .fxi{font-size:8px;padding:2px 5px;border-radius:3px;background:var(--fixed-bg)}
  .fxr .fxi .lb{font-weight:600;color:var(--success)}
  .tabs{display:flex;gap:0;border-bottom:2px solid var(--border);overflow-x:auto;background:var(--card);border-radius:var(--radius) var(--radius) 0 0}
  .tab{padding:4px 7px;font-size:10px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--text2);white-space:nowrap;transition:all .12s}
  .tab:hover{color:var(--text)}.tab.act{color:var(--primary);border-bottom-color:var(--primary)}
  .sc{display:none}.sc.act{display:block}
  .flt{display:flex;flex-wrap:wrap;gap:3px;align-items:center;background:var(--card);padding:3px 5px;border:1px solid var(--border);border-top:none}
  .flt label,.flt span{font-size:9px;color:var(--text2);display:flex;align-items:center;gap:2px}
  .flt input{padding:1px 3px;border:1px solid var(--border);border-radius:2px;font-size:9px}
  .flt input[type=number]{width:36px}.flt input[type=text]{width:70px}
  .flt .tag{padding:1px 5px;border-radius:6px;font-size:8px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:#fff;transition:all .12s}
  .flt .tag.act{background:var(--success);color:#fff;border-color:var(--success)}
  .tw{background:var(--card);border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);overflow:auto;max-height:calc(100vh - 260px)}
  table{width:100%;border-collapse:collapse;font-size:9px}
  thead{background:#f8f9fe}
  th{padding:2px 3px;text-align:left;font-weight:600;white-space:nowrap;border-bottom:1px solid var(--border);position:sticky;top:0;background:#f8f9fe;z-index:2;font-size:8px}
  th.cf{background:#e8f5e9}th.cf::after{content:" ✓";color:var(--success);font-size:7px}
  td{padding:2px 3px;border-bottom:1px solid var(--border);vertical-align:middle;max-width:65px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  tr:hover td{background:#f8f9fe}
  tr.tr-top td{background:#f0f7f0}tr.tr-dup td{background:#fffbe6}tr.tr-live td{background:#fff0f0}
  td .av{width:16px;height:16px;border-radius:50%;object-fit:cover;background:#eee;vertical-align:middle}
  td .gb{display:inline-block;padding:1px 3px;border-radius:3px;font-size:8px;font-weight:600}
  .gb.m{background:#eef1ff;color:var(--male)}.gb.f{background:#fff0f5;color:var(--female)}
  td .nc{text-align:right;font-family:monospace;font-size:9px}
  td .fc{color:var(--success);font-weight:600}td .ec{color:#ccc}
  .chk{width:10px;height:10px;cursor:pointer;vertical-align:middle}
  .badge{display:inline-block;padding:1px 3px;border-radius:2px;font-size:7px;font-weight:600;line-height:1.2}
  .badge-live{background:#ffe0e0;color:#d32f2f}
  .badge-dup{background:#fff3e0;color:#e65100}
  .badge-hot{background:#e3f2fd;color:#1565c0}
  .badge-old{background:#e8f5e9;color:#2e7d32}
  .badge-ok{background:#f3e5f5;color:#7b1fa2}
  .badge-newvoice{background:#fce4ec;color:#c62828}
  .legend{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:4px 8px;margin-top:4px;display:flex;flex-wrap:wrap;gap:3px 10px;font-size:8px;color:var(--text2);align-items:center}
  .legend span{display:inline-flex;align-items:center;gap:2px}
  .act{display:flex;gap:3px;justify-content:flex-end;align-items:center;margin-top:4px;flex-wrap:wrap}
  .act .btn{padding:2px 6px;border:none;border-radius:3px;font-size:9px;cursor:pointer;transition:opacity .12s}
  .act .btn:hover{opacity:.8}.act .bp{background:var(--primary);color:#fff}
  .act .bs{background:var(--success);color:#fff}
  .act .bo{background:transparent;border:1px solid var(--border);color:var(--text)}
  .act .btn:disabled{opacity:.35;cursor:not-allowed}
  .toast{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);background:#1a1d29;color:#fff;padding:4px 12px;border-radius:4px;font-size:9px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999}
  .toast.show{opacity:1}
  .rp{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:4px 6px;max-height:260px;overflow-y:auto}
  .rp h3{font-size:9px;font-weight:600;margin-bottom:2px}
  .rpi{display:flex;align-items:center;gap:3px;padding:2px 0;border-bottom:1px solid var(--border);font-size:9px}
  .rpi .rm{background:none;border:none;color:#ff3b30;cursor:pointer;font-size:8px;margin-left:auto;padding:1px 2px}
  @media(max-width:768px){body{padding:3px}header h1{font-size:12px}}
</style>
</head>
<body>
<div class="app">
<header><h1>🍩 AI主播替换 <small>格式修复 · 排序筛选 · 音色分类</small></h1></header>

<div class="uz" id="uz">
  <div class="icon">📋</div>
  <p>拖拽 xlsx 到此处，或点击选择文件</p>
  <button class="btn" id="ub">选择文件</button>
  <input type="file" id="fi" accept=".xlsx,.xls">
</div>

<div class="prog" id="prog">
  <div class="spin"></div>
  <div class="step" id="ps">准备中...</div>
  <div class="det" id="pd"></div>
  <div class="barw"><div class="barf" id="pb"></div></div>
</div>

<div class="sum" id="sum"></div>
<div class="fxr" id="fxr"></div>

<div class="cfg" id="cfg">
  <h3>⚙️ 配置</h3>
  <div class="cfg-row">
    <label>时段筛选 <select id="periodSel">
      <option value="all">全部时段</option>
      <option value="3">近3天</option>
      <option value="7">近7天</option>
      <option value="14">近14天</option>
      <option value="30">近30天</option>
      <option value="custom">自定义</option>
    </select></label>
    <label><input type="checkbox" id="periodExclude"> 排除此时段 → 看其余时段数据</label>
    <label id="dateLabel" style="display:none">从 <input type="date" id="dateFrom" style="width:90px"> 到 <input type="date" id="dateTo" style="width:90px"></label>
  </div>
  <div class="cfg-row" style="margin-top:2px">
    <label>已开播UID <textarea id="liveUids" placeholder="每行一个"></textarea></label>
    <button class="btn" id="btnApplyExclude">应用</button>
    <span id="liveCount" style="font-size:8px;color:var(--text2)"></span>
    <button class="btn" id="btnDedupAvatars">🖼 头像去重</button>
    <span id="dedupStatus" style="font-size:8px;color:var(--text2)"></span>
  </div>
</div>

<div id="mc" style="display:none">
  <div class="tabs">
    <div class="tab act" data-s="all">📊 总表</div>
    <div class="tab" data-s="male">👦 男</div>
    <div class="tab" data-s="female">👧 女</div>
    <div class="tab" data-s="analysis">📊 分析</div>
    <div class="tab" data-s="newvoice">🎙️ 新音色</div>
    <div class="tab" data-s="replace">📋 清单</div>
  </div>
  <div class="flt">
    <label>最低 <input type="number" id="mcf" value="0" min="0"></label>
    <label>ID <input type="text" id="sf" placeholder="搜索"></label>
    <div class="tag" id="tt">🏆 Top≥100</div>
    <span style="margin-left:auto"><span id="rc">0</span>/<span id="tc">0</span></span>
  </div>

  <div class="sc act" id="s-all"><div class="tw"><table><thead id="th-all"></thead><tbody id="tb-all"></tbody></table></div></div>
  <div class="sc" id="s-male"><div class="tw"><table><thead id="th-male"></thead><tbody id="tb-male"></tbody></table></div></div>
  <div class="sc" id="s-female"><div class="tw"><table><thead id="th-female"></thead><tbody id="tb-female"></tbody></table></div></div>
  <div class="sc" id="s-analysis"><div class="tw" id="analysisContent"><div style="padding:14px;text-align:center;color:var(--text2);">加载中...</div></div></div>
  <div class="sc" id="s-newvoice"><div class="tw"><table><thead id="th-newvoice"></thead><tbody id="tb-newvoice"></tbody></table></div></div>
  <div class="sc" id="s-replace"><div class="rp" id="rp"></div></div>

  <div class="legend">
    <span>🎙️新音色 | 🔴已播 | 🔄重复 | 🔥新星(≤14天) | ⭐沉淀(>14天) | 🟢可替</span>
    <span style="margin-left:auto">💡时段筛选:控制"总表/男/女"标签页的范围，勾选"排除"则看剩余数据</span>
  </div>

  <div class="act">
    <button class="btn bo" id="brf">🔄 刷新</button>
    <button class="btn bp" id="bar">➕ 添加至清单</button>
    <button class="btn bs" id="bex" disabled>📥 导出替换清单</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';
var H=['user_id','昵称','角色类型','性别','头像','tag','角色创建时间','创建者id','创建者注册时间','创作者性别','总聊天人数','深度聊天用户数【一天内有过聊天>10轮的用户】','总深度聊天率','女性聊天人数','女性深度聊天用户数【一天内聊天>10轮的用户】','女性深度聊天率','男性聊天人数','男性深度聊天用户数【一天内聊天>10轮的用户】','男性深度聊天率','角色简介','角色设定','开场白','开场白声音','voice_id','角色性格','说话风格','关系故事'];
var SH=['user_id','昵称','角色类型','性别','头像','tag','角色创建时间','总聊天人数','voice_id','角色简介','角色性格'];
var NC={};H.forEach(function(h){if(/人数|率/.test(h)&&h!=='角色类型')NC[h]=true;});

var rows=[],cmap=[],fixs={},rlist=[],topOnly=false,ready=false;
var liveSet={},dupSet={};
var periodDays=0,periodExclude=false; // 时段过滤

var caches={};
var curSec='fixed';

var $=function(id){return document.getElementById(id);};
var T=$('toast'),tm=null;
function msg(s,d){T.textContent=s;T.classList.add('show');clearTimeout(tm);tm=setTimeout(function(){T.classList.remove('show');},d||1500);}

$('ub').addEventListener('click',function(){$('fi').click();});
$('uz').addEventListener('click',function(e){if(e.target!==$('ub'))$('fi').click();});
$('fi').addEventListener('change',function(e){if(e.target.files[0])loadF(e.target.files[0]);});
['dragover','dragenter'].forEach(function(e){$('uz').addEventListener(e,function(ev){ev.preventDefault();$('uz').classList.add('dragover');});});
['dragleave','drop'].forEach(function(e){$('uz').addEventListener(e,function(ev){ev.preventDefault();$('uz').classList.remove('dragover');});});
$('uz').addEventListener('drop',function(e){if(e.dataTransfer.files[0])loadF(e.dataTransfer.files[0]);});

function pg(s,d,p){$('ps').textContent=s;$('pd').textContent=d||'';if(p!==undefined)$('pb').style.width=p+'%';$('prog').style.display='block';}
function hp(){$('prog').style.display='none';}

function loadF(file){
  if(!file.name.match(/\.xlsx?$/i)){msg('请上传 .xlsx 文件');return;}
  var mb=file.size/1024/1024;
  if(mb>500){msg('文件超过 500MB');return;}
  if(mb>200)msg('⚠️ 超过 200MB');
  rows=[];cmap=[];fixs={};rlist=[];topOnly=false;ready=false;liveSet={};dupSet={};caches={};
  $('mc').style.display='none';$('sum').style.display='none';$('fxr').style.display='none';$('cfg').style.display='none';$('uz').style.display='none';
  pg('读取...',mb.toFixed(1)+' MB',0);
  setTimeout(function(){
    var r=new FileReader();
    r.onprogress=function(e){if(e.lengthComputable)pg('读取...',(e.loaded/1024/1024).toFixed(1)+'/'+(e.total/1024/1024).toFixed(1)+'MB',Math.round(e.loaded/e.total*30));};
    r.onload=function(e){
      pg('解析表格...','',35);
      requestAnimationFrame(function(){
        try{
          var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellText:false,cellDates:false});
          pg('读取数据...','',50);
          setTimeout(function(){
            try{
              var ws=wb.Sheets[wb.SheetNames[0]];var ref=XLSX.utils.decode_range(ws['!ref']);var B=5000,rd=[];
              var hj=XLSX.utils.sheet_to_json(ws,{header:1,range:{s:{r:0,c:0},e:{r:0,c:ref.e.c}},defval:''});
              var rh=hj[0]?hj[0].map(function(h){return String(h).trim();}):[];
              var hl={};H.forEach(function(h){hl[h.toLowerCase().replace(/[\s\-_【】]/g,'')]=h;});
              cmap=rh.map(function(r){return hl[r.toLowerCase().replace(/[\s\-_【】]/g,'')]||r;});
              var cr=1;
              (function rb(){var er=Math.min(cr+B-1,ref.e.r);
                try{var batch=XLSX.utils.sheet_to_json(ws,{header:1,range:{s:{r:cr,c:0},e:{r:er,c:ref.e.c}},defval:''});
                for(var bi=0;bi<batch.length;bi++){var raw=batch[bi],row={},has=false;for(var ci=0;ci<cmap.length;ci++){var v=raw[ci]!==undefined?raw[ci]:'';if(v===null||v===undefined)v='';row[cmap[ci]]=v;if(v!=='')has=true;}if(has)rd.push(row);}
                cr=er+1;if(cr<=ref.e.r){var pct=50+Math.round((cr-ref.s.r)/(ref.e.r-ref.s.r)*30);pg('解析...',Math.min(cr,ref.e.r)+'/'+(ref.e.r-ref.s.r)+'行',Math.min(pct,80));setTimeout(rb,0);}
                else{rows=rd;setTimeout(fix,0);}}catch(err){msg('解析出错');hp();$('uz').style.display='block';}})();
            }catch(err){msg('失败');console.error(err);hp();$('uz').style.display='block';}
          },0);
        }catch(err){msg('失败');console.error(err);hp();$('uz').style.display='block';}
      });
    };r.readAsArrayBuffer(file);
  },100);
}

function fix(){
  pg('修复数值...','',82);
  setTimeout(function(){
    fixs={};var nk=Object.keys(NC);
    for(var ci=0;ci<nk.length;ci++){var col=nk[ci];if(cmap.indexOf(col)===-1)continue;var fixed=0,ex=[];
      for(var ri=0;ri<rows.length;ri++){var row=rows[ri],raw=String(row[col]).trim();
        if(raw===''||/^(none|nan|na|null|undefined)$/i.test(raw)){row[col]=0;continue;}
        var cleaned=raw.replace(/[,\s]/g,''),num=parseFloat(cleaned);
        if(!isNaN(num)){if(String(num)!==cleaned){fixed++;row[col]=num;if(ex.length<3&&cleaned.length<15)ex.push(raw);}else row[col]=num;}else row[col]=0;}
      if(fixed>0)fixs[col]={fixed:fixed,examples:ex};}
    ready=true;pg('渲染...','',95);setTimeout(done,0);
  },0);
}

function done(){
  var m=0,f=0,tc=0;
  for(var i=0;i<rows.length;i++){var g=gd(rows[i]);if(g==='男')m++;else if(g==='女')f++;if(cht(rows[i])>=100)tc++;}
  var fk=Object.keys(fixs);
  $('sum').style.display='flex';
  $('sum').innerHTML='<div class="st"><div class="nm">'+rows.length.toLocaleString()+'</div><div class="lb">总角色</div></div><div class="st m"><div class="nm">'+m.toLocaleString()+'</div><div class="lb">男</div></div><div class="st f"><div class="nm">'+f.toLocaleString()+'</div><div class="lb">女</div></div><div class="st tp"><div class="nm">'+tc.toLocaleString()+'</div><div class="lb">Top(≥100)</div></div><div class="st fx" style="margin-left:auto"><div class="nm">'+fk.length+'</div><div class="lb">修复列</div></div>';
  if(fk.length){$('fxr').style.display='block';var h='<h3>🔧 数值格式已修复：</h3><div class="fxg">';for(var ki=0;ki<fk.length;ki++){var s=fixs[fk[ki]];h+='<div class="fxi"><span class="lb">'+fk[ki]+'</span> <span class="sm">'+s.fixed.toLocaleString()+'条'+(s.examples.length?' 例:'+s.examples.join(','):'')+'</span></div>';}h+='</div>';$('fxr').innerHTML=h;}
  $('tc').textContent=rows.length.toLocaleString();hp();$('cfg').style.display='block';$('mc').style.display='block';
  rs('all');msg('✅ 已加载 '+rows.length.toLocaleString()+' 条');
}

function v(row,col){var x=row[col];return(x!==undefined&&x!==null)?x:'';}
function cht(row){var x=v(row,'总聊天人数');return typeof x==='number'?x:0;}
function gd(row){var g=String(v(row,'性别')).trim().toLowerCase();if(/^(male|男|男生|1)$/.test(g))return '男';if(/^(female|女|女生|2)$/.test(g))return '女';return g||'未知';}
function isTR(r){return cht(r)>=100;}
function dt(r){return v(row,'角色创建时间');}
function parseDate(d){if(!d)return null;var p=d.split('-');if(p.length!==3)return null;return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));}
function daysAgo(n){var d=new Date();d.setDate(d.getDate()-n);return d;}
function isLive(r){return liveSet[String(v(r,'user_id'))]?true:false;}
function isDup(r){return dupSet[String(v(r,'user_id'))]?true:false;}
function isNewVoice(r){var vid=String(v(r,'voice_id')).trim().toLowerCase();return/^nansheng|^nvsheng/.test(vid);}

// Period filter
function inPeriod(r){
  if(!periodDays)return true;
  var d=vt(r);if(!d)return false;
  var pd=parseDate(d);if(!pd)return false;
  var inside=pd>=daysAgo(periodDays);
  return periodExclude?!inside:inside;
}
function vt(r){return v(r,'角色创建时间');}

// Is this role created recently (within hotDays)?

function compStatus(r){
  var s=[];
  if(isNewVoice(r))s.push('newvoice');
  if(isLive(r))s.push('live');
  if(isDup(r))s.push('dup');
  if(isTR(r)&&vt(r)){var d=parseDate(vt(r));if(d){var age=(new Date()-d)/(864e5);if(age<=14)s.push('newhot');else s.push('established');}}
  if(!s.length&&isTR(r))s.push('ok');
  return s;
}

// ── Data fetching (with caching) ──
function getC(section){
  var ck=section+'_p'+periodDays+'x'+(periodExclude?1:0)+'_m'+($('mcf').value||'0')+'_s'+($('sf').value||'')+'_t'+(topOnly?1:0)+'_l'+Object.keys(liveSet).length+'_d'+Object.keys(dupSet).length+'_f'+($('dateFrom').value||'')+'_t'+($('dateTo').value||'');
  if(caches[ck])return caches[ck];

  var data=[];
  var min=parseInt($('mcf').value)||0;
  var search=$('sf').value.trim().toLowerCase();
  var dFrom=$('dateFrom').value?parseDate($('dateFrom').value):null;
  var dTo=$('dateTo').value?parseDate($('dateTo').value):null;
  if(dTo)dTo.setHours(23,59,59,999);
  var usePeriod=(section!=='fixed'&&section!=='newvoice');

  for(var i=0;i<rows.length;i++){
    var r=rows[i],c=cht(r);
    if(c<min)continue;
    if(topOnly&&c<100)continue;
    if(search){var id=String(v(r,'user_id')).toLowerCase();if(id.indexOf(search)===-1)continue;}
    if(section==='male'&&gd(r)!=='男')continue;
    if(section==='female'&&gd(r)!=='女')continue;
    if(section==='newvoice'&&!isNewVoice(r))continue;
    if(usePeriod&&!inPeriod(r))continue;
    data.push(r);
  }
  data.sort(function(a,b){return cht(b)-cht(a);});
  caches[ck]=data;
  return data;
}

  // Extract bracket themes: [xxx] or 【xxx】
  var bracketThemes=[];
  var bm1=desc.match(/\[([^\]]+)\]/);
  var bm2=desc.match(/【([^】]+)】/);
  if(bm1)bracketThemes=bm1[1].split(/[\s,\/、]+/).map(function(s){return s.trim();}).filter(function(s){return s.length>1;});
  if(bm2)bracketThemes=bracketThemes.concat(bm2[1].split(/[\s,\/、]+/).map(function(s){return s.trim();}).filter(function(s){return s.length>1;}));

    {name:'🔥 强占有欲',kws:['占有欲','独占','强取豪夺','强制爱','占有','掌控','占有'],wt:1},

  });
  scores.sort(function(a,b){return b.score-a.score;});

  if(scores.length)return scores[0].name;
  // Fallback: extract theme from bracket content

}

function renderAnalysis(){

  if(!data.length){el.innerHTML='<div style="padding:14px;text-align:center;color:var(--text2);font-size:10px;">没有足够的高数据角色进行分析（需要总聊天人数≥100）</div>';return;}

  // ---- 1. Tag analysis with Chinese meanings ----
  var tagCount={};
  data.forEach(function(r){
    var t=v(r,'tag');if(!t)return;
    try{JSON.parse(t).forEach(function(tag){
      if(!tagCount[tag])tagCount[tag]={count:0,totalChat:0};
      tagCount[tag].count++;tagCount[tag].totalChat+=cht(r);
    });}catch(e){}
  });
  var tags=Object.keys(tagCount).sort(function(a,b){return tagCount[b].count-tagCount[a].count;});

  // ---- 2. Archetype classification ----
  var archCount={};
  data.forEach(function(r){
    var a=classifyArchetype(r);
    if(!archCount[a])archCount[a]={count:0,totalChat:0,male:0,female:0};
    archCount[a].count++;
    archCount[a].totalChat+=cht(r);
    if(gd(r)==='男')archCount[a].male++;else if(gd(r)==='女')archCount[a].female++;
  });
  var archs=Object.keys(archCount).sort(function(a,b){return archCount[b].count-archCount[a].count;});

  s+='<div class="section"><h3>🏷️ 热门标签分析</h3><table>';
  s+='<tr><th>标签</th><th>中文含义</th><th>出现次数</th><th>占比</th><th>平均聊天</th><th>男性</th><th>女性</th></tr>';
  var maxTag=tags.length?tagCount[tags[0]].count:1;
  tags.slice(0,25).forEach(function(t){
    var tc=tagCount[t];
    var meaning=TAG_DICT[t]||t.replace('tag_','');
    var pct=(tc.count/data.length*100).toFixed(1)+'%';
    var avg=(tc.totalChat/tc.count).toFixed(0);
    var m=tagMale[t]||0,f=tagFemale[t]||0;
    s+='<tr class="tag-row"><td style="font-family:monospace;font-size:8px">'+t+'</td><td>'+meaning+'</td>'+
      '<td>'+tc.count+'</td><td>'+pct+'</td>'+
      '<td class="nc">'+avg+'</td>'+
      '<td class="nc" style="color:var(--male)">'+m+'</td>'+
      '<td class="nc" style="color:var(--female)">'+f+'</td></tr>';
  });
  s+='</table></div>';

  // Archetype × gender cross analysis
  var maleArchs=Object.keys(maleArch).sort(function(a,b){return maleArch[b]-maleArch[a];});
  var femaleArchs=Object.keys(femaleArch).sort(function(a,b){return femaleArch[b]-femaleArch[a];});
  s+='<div class="section"><h3>👤 性别偏好对比</h3><table><tr><th>排序</th><th style="color:var(--male)">👦 男性角色热门题材</th><th style="color:var(--female)">👧 女性角色热门题材</th></tr>';
  var maxRow=Math.max(maleArchs.length,femaleArchs.length);
  for(var ri=0;ri<Math.min(maxRow,12);ri++){
    var ml=maleArchs[ri]||'',mc=maleArch[maleArchs[ri]]||'';
    var fl=femaleArchs[ri]||'',fc=femaleArch[femaleArchs[ri]]||'';
    s+='<tr><td style="text-align:center">'+(ri+1)+'</td>'+
      '<td>'+(ml?ml+' <span class="tag-row" style="color:var(--text2)">('+mc+')</span>':'—')+'</td>'+
      '<td>'+(fl?fl+' <span style="color:var(--text2)">('+fc+')</span>':'—')+'</td></tr>';
  }
  s+='</table></div>';

  var html='<style>.abp{font-size:9px;}.abp h3{font-size:11px;font-weight:600;margin:8px 0 4px;}.abp table{width:auto;min-width:300px;}.abp th{font-size:9px;padding:3px 6px;text-align:left;font-weight:600;background:#f8f9fe;border-bottom:1px solid var(--border);}.abp td{padding:2px 6px;font-size:9px;border-bottom:1px solid var(--border);}.abp .tag-row:hover td{background:#f8f9fe;}.abp .section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;margin-bottom:6px}.abp .nc{text-align:right;font-family:monospace;font-size:9px}</style><div class="abp">'+s+'</div>';
  el.innerHTML=html;
}

function renderRP(){
  var rp=$('rp');
  if(!rlist.length){rp.innerHTML='<p style="color:var(--text2);font-size:9px;">替换清单为空</p>';return;}
  var items='';
  for(var ri=0;ri<rlist.length;ri++){
    var id=rlist[ri],row=null;
    for(var rj=0;rj<rows.length;rj++){if(String(v(rows[rj],'user_id'))===String(id)){row=rows[rj];break;}}
    if(!row){items+='<div class="rpi">⚠️ '+id+' <button class="rm" data-id="'+id+'">✕</button></div>';continue;}
    var name=v(row,'昵称')||'—',g=gd(row),c=cht(row),img=v(row,'头像'),gc=g==='男'?'m':'f';
    items+='<div class="rpi">'+(img?'<img class="av" src="'+img+'" onerror="this.style.display=\'none\'">':'<div style="width:16px;height:16px;border-radius:50%;background:#eee;"></div>')+'<strong>'+name+'</strong> <span style="font-family:monospace;font-size:8px;color:var(--text2);">'+id+'</span><span class="gb '+gc+'">'+g+'</span> <span style="font-weight:600;">'+c.toLocaleString()+'</span>人次<button class="rm" data-id="'+id+'">✕</button></div>';
  }
  rp.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;"><h3>📋 待替换 ('+rlist.length+')</h3><button id="cc" class="btn bo" style="padding:1px 4px;font-size:8px;">清空</button></div>'+items;
  rp.querySelectorAll('.rm').forEach(function(btn){btn.addEventListener('click',function(){rlist=rlist.filter(function(i){return i!==btn.dataset.id;});$('bex').disabled=rlist.length===0;renderRP();caches={};rs(document.querySelector('.tab.act').dataset.s);});});
  var cb=rp.querySelector('#cc');if(cb)cb.addEventListener('click',function(){rlist=[];$('bex').disabled=true;renderRP();caches={};rs(document.querySelector('.tab.act').dataset.s);});
}

$('bex').addEventListener('click',function(){
  if(!rlist.length){msg('清单为空');return;}
  var out=[];
  for(var ri=0;ri<rlist.length;ri++){var id=rlist[ri],row=null;
    for(var rj=0;rj<rows.length;rj++){if(String(v(rows[rj],'user_id'))===String(id)){row=rows[rj];break;}}
    if(!row)continue;var obj={'操作类型':'替换上线'};
    for(var hi=0;hi<SH.length;hi++){var col=SH[hi],val2=v(row,col);if(col==='性别')val2=gd(row);else if(NC[col]&&typeof val2==='number')val2=col.indexOf('率')>=0?val2.toFixed(4):val2;obj[col]=val2;}
    out.push(obj);}
  if(!out.length){msg('无数据');return;}
  var ws=XLSX.utils.json_to_sheet(out);var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'替换清单');
  XLSX.writeFile(wb,'替换清单_'+new Date().toISOString().slice(0,10)+'.xlsx');
  msg('📥 已导出 '+out.length+' 条');
});
document.addEventListener('keydown',function(e){if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();$('bex').click();}});
})();
